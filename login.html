<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ojasvi - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&f[]=satoshi@400,500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .container {
            margin-top: 100px;
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: url('../images/login/pexels-perqued-13722871.jpg') center/cover no-repeat;
            position: relative;
        }

        .left::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.6),
                    rgba(0, 0, 0, 0.8));
        }

        .overlay {
            position: absolute;
            bottom: 120px;
            left: 60px;
            color: #F5F1EB;
            z-index: 2;
        }

        .overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            letter-spacing: 6px;
            font-weight: 500;
        }

        .overlay p {
            margin-top: 12px;
            font-size: 16px;
            letter-spacing: 2px;
            color: #C5A47E;
        }

        .overlay p::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background: #C5A47E;
            margin-top: 10px;
        }

        .right {
            flex: 1;
            background: #F5F1EB;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            text-decoration: none;
            color: #0F0F0F;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #C5A47E;
        }

        .form-box {
            width: 350px;
        }

        .form-box h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 1px solid #ccc;
            background: transparent;
            outline: none;
        }

        .forgot-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .forgot-link {
            font-size: 13px;
            color: #777;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
        }

        .forgot-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 0%;
            height: 1px;
            background: #C5A47E;
            transition: 0.3s;
        }

        .forgot-link:hover {
            color: #C5A47E;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        label input[type="checkbox"] {
            width: 12px;
            height: 12px;
            cursor: pointer;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0F0F0F;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #C5A47E;
            color: #000;
        }

        .switch {
            margin-top: 15px;
            font-size: 14px;
        }

        .switch span {
            color: #C5A47E;
            cursor: pointer;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .divider-login {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider-login span {
            background: #F5F1EB;
            padding: 0 10px;
            position: relative;
            z-index: 2;
            font-size: 12px;
            color: #777;
        }

        .divider-login::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #ddd;
            z-index: 1;
        }

        .google-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .google-btn {
            width: 50px;
            height: 50px;
            padding: 12px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;

            color: #000;
            font-weight: 500;
        }

        .google-btn img {
            width: 18px;
        }

        .google-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .tooltip {
            position: relative;
        }

        .tooltip-text {
            position: absolute;
            bottom: 80%;
            left: 50%;
            transform: translateX(-50%);
            background: #0F0F0F;
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;

            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #0F0F0F transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text {
            opacity: 1;
        }

        .page-enter {
            animation: slideIn 0.5s ease forwards;
        }

        .slide-out {
            animation: slideRight 0.5s ease forwards;
        }

        @keyframes slideRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(30%);
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(30%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <div class="container">

        <div class="left">
            <div class="overlay">
                <h1>OJASVI</h1>
                <p>Luxury Home Linen</p>
            </div>
        </div>

        <div class="right">

            <a href="#" onclick="goBackWithAnimation(event)" class="back-btn">
                ← Go Back
            </a>

            <div class="form-box">

                <h2 id="form-title">Welcome Back</h2>

                <form id="loginForm">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <div class="forgot-wrapper">
                        <a href="forgetPassword.html" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit">Sign In</button>

                    <p class="switch">
                        Don’t have an account?
                        <span onclick="toggleForm()">Sign Up</span>
                    </p>
                </form>

                <form id="signupForm" class="hidden">

                    <input type="text" name="firstName" placeholder="Full Name" required>
                    <input type="email" name="email" placeholder="Email Address" required>
                    <input type="text" name="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>

                    <input type="password" name="password" placeholder="Password" required>
                    <input type="password" name="confirmPassword" placeholder="Confirm Password" required>

                    <small style="font-size:12px; color:#777;">
                        Password must be at least 6 characters
                    </small>

                    <label style="font-size:13px; display:flex; gap:8px; margin:10px 0;">
                        <input type="checkbox" required>
                        I agree to Terms & Conditions
                    </label>

                    <button type="submit">Join Ojasvi</button>

                    <p class="switch">
                        Already have an account?
                        <span onclick="toggleForm()">Sign In</span>
                    </p>

                </form>

                <div class="divider-login">
                    <span>OR CONTINUE WITH</span>
                </div>

                <div class="google-wrapper">
                    <div class="tooltip">
                        <button class="google-btn">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
                        </button>
                        <span class="tooltip-text">Continue with Google</span>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <div id="footer"></div>

    <script src="js/script.js"></script>
    <script>

        window.addEventListener("load", () => {
            const container = document.querySelector(".container");
            container.classList.add("page-enter");
        });

        function toggleForm() {
            const login = document.getElementById("loginForm");
            const signup = document.getElementById("signupForm");
            const title = document.getElementById("form-title");

            login.classList.toggle("hidden");
            signup.classList.toggle("hidden");

            if (login.classList.contains("hidden")) {
                title.innerText = "Create Account";
            } else {
                title.innerText = "Welcome Back";
            }
        }

        function goBackWithAnimation(e) {
            e.preventDefault();

            const container = document.querySelector(".container");

            container.classList.remove("page-enter");

            void container.offsetWidth;

            container.classList.add("slide-out");

            setTimeout(() => {
                window.history.back();
            }, 500);
        }
    </script>

</body>

</html>
