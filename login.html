<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ojasvi - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- <link rel="stylesheet" href="login.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0F0F0F;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: url('../images/login/pexels-perqued-13722871.jpg') center/cover no-repeat;
            position: relative;
        }

        .left::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.6),
                    rgba(0, 0, 0, 0.8));
        }

        .overlay {
            position: absolute;
            bottom: 80px;
            left: 60px;
            color: #F5F1EB;
            z-index: 2;
        }

        .overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            letter-spacing: 6px;
            font-weight: 500;
        }

        .overlay p {
            margin-top: 12px;
            font-size: 16px;
            letter-spacing: 2px;
            color: #C5A47E;
        }

        .overlay p::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background: #C5A47E;
            margin-top: 10px;
        }

        .right {
            flex: 1;
            background: #F5F1EB;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 40px;
            text-decoration: none;
            color: #0F0F0F;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #C5A47E;
        }

        .form-box {
            width: 350px;
        }

        .form-box h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-bottom: 1px solid #ccc;
            background: transparent;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0F0F0F;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #C5A47E;
            color: #000;
        }

        .switch {
            margin-top: 15px;
            font-size: 14px;
        }

        .switch span {
            color: #C5A47E;
            cursor: pointer;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider span {
            background: #F5F1EB;
            padding: 0 10px;
            position: relative;
            z-index: 2;
            font-size: 12px;
            color: #777;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: #ddd;
            z-index: 1;
        }

        .google-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .google-btn {
            width: 50px;
            height: 50px;
            padding: 12px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;

            color: #000;
            font-weight: 500;
        }

        .google-btn img {
            width: 18px;
        }

        .google-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .tooltip {
            position: relative;
        }

        .tooltip-text {
            position: absolute;
            bottom: 80%;
            left: 50%;
            transform: translateX(-50%);
            background: #0F0F0F;
            color: #fff;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;

            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #0F0F0F transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text {
            opacity: 1;
        }

        .page-enter {
            animation: slideIn 0.5s ease forwards;
        }

        .slide-out {
            animation: slideRight 0.5s ease forwards;
        }

        @keyframes slideRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(30%);
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(30%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <div class="overlay">
                <h1>OJASVI</h1>
                <p>Luxury Home Linen</p>
            </div>
        </div>

        <div class="right">

            <a href="#" onclick="goBackWithAnimation(event)" class="back-btn">
                ← Go Back
            </a>

            <div class="form-box">

                <h2 id="form-title">Welcome Back</h2>

                <form id="loginForm">
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>

                    <button type="submit">Sign In</button>

                    <p class="switch">
                        Don’t have an account?
                        <span onclick="toggleForm()">Sign Up</span>
                    </p>
                </form>

                <form id="signupForm" class="hidden">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>

                    <button type="submit">Create Account</button>

                    <p class="switch">
                        Already have an account?
                        <span onclick="toggleForm()">Sign In</span>
                    </p>
                </form>

                <div class="divider">
                    <span>OR LOGIN USING</span>
                </div>

                <div class="google-wrapper">
                    <div class="tooltip">
                        <button class="google-btn">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
                        </button>
                        <span class="tooltip-text">Continue with Google</span>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="login.js"></script>
    <script>

        window.addEventListener("load", () => {
            const container = document.querySelector(".container");
            container.classList.add("page-enter");
        });

        function toggleForm() {
            const login = document.getElementById("loginForm");
            const signup = document.getElementById("signupForm");
            const title = document.getElementById("form-title");

            login.classList.toggle("hidden");
            signup.classList.toggle("hidden");

            if (login.classList.contains("hidden")) {
                title.innerText = "Create Account";
            } else {
                title.innerText = "Welcome Back";
            }
        }

        function goBackWithAnimation(e) {
    e.preventDefault();

    const container = document.querySelector(".container");

    container.classList.remove("page-enter");

    void container.offsetWidth;

    container.classList.add("slide-out");

    setTimeout(() => {
        window.history.back();
    }, 500);
}
    </script>

</body>

</html>
