<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ojasvi | Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        .ojasvi-checkout-page {
            background: #F5F1EB;
            padding: 80px 20px;
            font-family: 'Poppins', sans-serif;
        }

        .ojasvi-checkout-container {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 40px;
        }

        /* LEFT FORM */
        .ojasvi-checkout-form {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
        }

        .ojasvi-checkout-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .ojasvi-form-group {
            margin-bottom: 15px;
        }

        .ojasvi-form-group input,
        .ojasvi-form-group textarea,
        .ojasvi-form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .ojasvi-row {
            display: flex;
            gap: 10px;
        }

        .ojasvi-row input {
            flex: 1;
        }

        /* PAYMENT */
        .ojasvi-payment {
            margin-top: 20px;
        }

        .ojasvi-payment label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
        }

        /* RIGHT SUMMARY */
        .ojasvi-summary {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            height: fit-content;
        }

        .ojasvi-summary h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 20px;
        }

        .ojasvi-summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .ojasvi-summary-total {
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
        }

        /* BUTTON */
        .ojasvi-place-order {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            background: #000;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .ojasvi-place-order:hover {
            background: #333;
        }

        /* MOBILE */
        @media(max-width: 768px) {
            .ojasvi-checkout-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="ojasvi-checkout-page">

    <div class="ojasvi-checkout-container">

        <!-- LEFT: FORM -->
        <div class="ojasvi-checkout-form">
            <h2 class="ojasvi-checkout-title">Billing Details</h2>

            <div class="ojasvi-row">
                <div class="ojasvi-form-group">
                    <input type="text" placeholder="First Name">
                </div>
                <div class="ojasvi-form-group">
                    <input type="text" placeholder="Last Name">
                </div>
            </div>

            <div class="ojasvi-form-group">
                <input type="email" placeholder="Email Address">
            </div>

            <div class="ojasvi-form-group">
                <input type="text" placeholder="Phone Number">
            </div>

            <div class="ojasvi-form-group">
                <textarea placeholder="Full Address"></textarea>
            </div>

            <div class="ojasvi-row">
                <div class="ojasvi-form-group">
                    <input type="text" placeholder="City">
                </div>
                <div class="ojasvi-form-group">
                    <input type="text" placeholder="Pincode">
                </div>
            </div>

            <!-- PAYMENT -->
            <div class="ojasvi-payment">
                <h3>Payment Method</h3>

                <label>
                    <input type="radio" name="payment"> Cash on Delivery
                </label>

                <label>
                    <input type="radio" name="payment"> UPI / Card Payment
                </label>
            </div>
        </div>

        <!-- RIGHT: SUMMARY -->
        <div class="ojasvi-summary">
            <h2>Order Summary</h2>

            <div class="ojasvi-summary-item">
                <span>Product 1</span>
                <span>₹1200</span>
            </div>

            <div class="ojasvi-summary-item">
                <span>Product 2</span>
                <span>₹800</span>
            </div>

            <hr>

            <div class="ojasvi-summary-item">
                <span>Subtotal</span>
                <span>₹2000</span>
            </div>

            <div class="ojasvi-summary-item">
                <span>Shipping</span>
                <span>Free</span>
            </div>

            <div class="ojasvi-summary-total">
                Total: ₹2000
            </div>

            <button class="ojasvi-place-order">
                Place Order
            </button>
        </div>

    </div>

</div>

</body>
</html>
