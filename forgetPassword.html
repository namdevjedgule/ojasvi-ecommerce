<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Ojasvi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #F5F1EB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #2B2B2B;
        }

        .card {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 350px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #C5A47E;
        }

        .btn-forgot {
            position: relative;
            display: inline-block;
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #C5A47E, #A67C52);
            color: white;
            font-size: 15px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.4s;
        }

        .btn-forgot::after {
            content: "";
            position: absolute;
            width: 300%;
            height: 300%;
            top: 100%;
            left: -100%;
            background: rgba(255,255,255,0.15);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .btn-forgot:hover::after {
            top: -50%;
            left: -50%;
        }

        .btn-forgot:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(197,164,126,0.3);
        }

        .back-login {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            text-decoration: none;
            color: #888;
            transition: 0.3s;
        }

        .back-login:hover {
            color: #C5A47E;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Forgot Password?</h2>
        <p>Enter your email to receive a reset link</p>

        <input type="email" placeholder="Enter your email">

        <button class="btn-forgot">Send Reset Link</button>

        <a href="login.html" class="back-login">Back to Login</a>
    </div>

</body>
</html>
