<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ojasvi - Wishlist</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&f[]=satoshi@400,500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="navbar"></div>

    <section class="wishlist-section section">

        <h2>My Wishlist</h2>

        <div id="wishlist-section-items"></div>

        <div class="empty-wishlist" id="emptyWishlist">
            <i class="fa-solid fa-heart"></i>
            <h3>Your Wishlist is Empty</h3>
            <p>Save items you love</p>
            <a href="shop.html" class="btn">Explore Products</a>
        </div>

    </section>

    <div id="footer"></div>

    <script src="js/script.js"></script>
    <script>
        const wishlistContainer = document.getElementById("wishlist-section-items");
        const emptyWishlist = document.getElementById("emptyWishlist");

        function checkWishlist() {
    if (wishlistContainer.children.length === 0) {
        emptyWishlist.classList.add("show");
    } else {
        emptyWishlist.classList.remove("show");
    }
}

        checkWishlist();
    </script>

</body>

</html>
